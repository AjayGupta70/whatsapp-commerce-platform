version: '3.8'

services:
  # ─── Application ────────────────────────────
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: whatsapp-automation-app
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3000}:3000'
    env_file:
      - ../.env.docker
      - ../.env
    environment:
      - NODE_ENV=${NODE_ENV:-docker}
      - APP_PORT=${APP_PORT:-3000}
      - DATABASE_URL=${DATABASE_URL:-postgresql://admin:password@postgres:5432/whatsapp_automation?schema=public}
      - MONGO_URI=${MONGO_URI:-mongodb://admin:password@mongodb:27017/whatsapp_automation?authSource=admin}
      - MONGODB_URI=${MONGODB_URI:-mongodb://admin:password@mongodb:27017/whatsapp_automation?authSource=admin}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-password}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://admin:password@rabbitmq:5672}
      - JWT_SECRET=${JWT_SECRET:-docker-secret-key}
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - whatsapp-sessions:/app/sessions

  # ─── MongoDB (Messages, Chats, Logs) ───────
  mongodb:
    image: mongo:7
    container_name: whatsapp-automation-mongodb
    restart: unless-stopped
    ports:
      - '${MONGO_PORT:-27017}:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-whatsapp_automation}
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ─── PostgreSQL (Users, Tenants, Orders) ────
  postgres:
    image: postgres:16-alpine
    container_name: whatsapp-automation-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-whatsapp_automation}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-admin}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ─── Redis (Sessions, Cache, State) ─────────
  redis:
    image: redis:7-alpine
    container_name: whatsapp-automation-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-password}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ─── RabbitMQ (Event Bus) ───────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: whatsapp-automation-rabbitmq
    restart: unless-stopped
    ports:
      - '${RABBITMQ_PORT:-5672}:5672'
      - '${RABBITMQ_MGMT_PORT:-15672}:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-password}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  mongodb-data:
  postgres-data:
  redis-data:
  rabbitmq-data:
  whatsapp-sessions:

networks:
  app-network:
    driver: bridge
