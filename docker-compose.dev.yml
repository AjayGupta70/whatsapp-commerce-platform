# Development override — mounts source code, enables hot reload
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev
    environment:
      NODE_ENV: development
      NODE_OPTIONS: --max-old-space-size=1024
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
